<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 384" width="256" height="384">
  <defs>
    <linearGradient id="armorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0506"/>
      <stop offset="0.5" stop-color="#2a0808"/>
      <stop offset="1" stop-color="#0a0203"/>
    </linearGradient>
    <linearGradient id="redSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b3a3a"/>
      <stop offset="1" stop-color="#2a1010"/>
    </linearGradient>
    <linearGradient id="staffGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff0033"/>
      <stop offset="0.5" stop-color="#ff4060"/>
      <stop offset="1" stop-color="#880022"/>
    </linearGradient>
    <radialGradient id="auraRed" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff0033" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ff0033" stop-opacity="0"/>
    </radialGradient>

    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redStrongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b1"/>
      <feGaussianBlur stdDeviation="12" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background aura -->
  <ellipse cx="128" cy="220" rx="110" ry="150" fill="url(#auraRed)"/>

  <!-- Shadow on ground -->
  <ellipse cx="128" cy="365" rx="60" ry="8" fill="#000" opacity="0.6"/>

  <!-- Armored cloak — tattered back -->
  <path d="M72 180 Q54 280 64 362 L86 362 L82 320 L90 260 L100 200 Z"
        fill="url(#armorGrad)"/>
  <path d="M184 180 Q202 280 192 362 L170 362 L174 320 L166 260 L156 200 Z"
        fill="url(#armorGrad)"/>

  <!-- Main body — tattered armor -->
  <path d="M88 175 Q74 280 84 355 L172 355 Q182 280 168 175 Q150 155 128 155 Q106 155 88 175 Z"
        fill="url(#armorGrad)" stroke="#3a0808" stroke-width="1"/>

  <!-- Torn edges -->
  <path d="M84 340 L88 360 L92 342 L96 362 L100 345" stroke="#3a0808" stroke-width="1.5" fill="none"/>
  <path d="M156 345 L160 362 L164 342 L168 360 L172 340" stroke="#3a0808" stroke-width="1.5" fill="none"/>

  <!-- Circuit patterns on armor (glitching) -->
  <g stroke="#ff0033" stroke-width="0.7" fill="none" opacity="0.9" filter="url(#redGlow)">
    <path d="M98 200 L112 200 L112 215 L120 215"/>
    <path d="M144 200 L158 200 L158 215 L150 215"/>
    <path d="M100 250 L120 250 L120 270"/>
    <path d="M156 250 L136 250 L136 270"/>
    <path d="M110 290 L146 290"/>
    <circle cx="112" cy="200" r="1" fill="#ff0033"/>
    <circle cx="144" cy="200" r="1" fill="#ff0033"/>
    <circle cx="128" cy="290" r="1.5" fill="#ff0033"/>
  </g>

  <!-- Chest plate / spikes -->
  <path d="M112 190 L128 170 L144 190 L140 220 L128 210 L116 220 Z" fill="#3a0808" stroke="#ff0033" stroke-width="0.8" opacity="0.95"/>
  <path d="M120 175 L128 160 L136 175" fill="#2a0606" stroke="#ff0033" stroke-width="0.6"/>

  <!-- Belt -->
  <rect x="96" y="245" width="64" height="7" fill="#0a0203" stroke="#ff0033" stroke-width="0.6"/>
  <rect x="124" y="244" width="8" height="9" fill="#880022" stroke="#ff0033" stroke-width="0.4"/>

  <!-- Neck -->
  <rect x="120" y="115" width="16" height="22" fill="url(#redSkin)"/>

  <!-- Head — hooded -->
  <path d="M98 110 Q94 60 128 55 Q162 60 158 110 L158 128 Q158 140 128 140 Q98 140 98 128 Z" fill="#0a0203"/>
  <!-- Face shadow inside hood -->
  <ellipse cx="128" cy="110" rx="20" ry="24" fill="url(#redSkin)" opacity="0.7"/>

  <!-- Glowing red eyes -->
  <g filter="url(#redStrongGlow)">
    <ellipse cx="120" cy="105" rx="3" ry="2" fill="#ff0033"/>
    <ellipse cx="136" cy="105" rx="3" ry="2" fill="#ff0033"/>
  </g>
  <!-- Sinister grin -->
  <path d="M120 120 Q128 126 136 120" stroke="#ff0033" stroke-width="1" fill="none" opacity="0.9"/>
  <path d="M122 122 L134 122" stroke="#3a0808" stroke-width="0.8"/>

  <!-- Hood rim glow -->
  <path d="M98 110 Q94 60 128 55 Q162 60 158 110" stroke="#ff0033" stroke-width="1" fill="none" opacity="0.8" filter="url(#redGlow)"/>

  <!-- Left arm extended with staff -->
  <path d="M92 175 L66 220 L50 280" stroke="url(#armorGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
  <circle cx="50" cy="282" r="6" fill="url(#redSkin)"/>

  <!-- Dark staff with red crystal -->
  <g filter="url(#redStrongGlow)">
    <!-- Staff shaft -->
    <path d="M50 285 L10 90" stroke="#1a0506" stroke-width="5" stroke-linecap="round"/>
    <path d="M50 285 L10 90" stroke="#880022" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- Crystal head -->
    <path d="M4 78 L10 60 L22 70 L20 92 L10 96 L2 88 Z" fill="url(#staffGrad)" stroke="#ff4060" stroke-width="0.8"/>
    <!-- Inner crystal -->
    <path d="M10 68 L14 78 L12 90 L6 84 Z" fill="#ff8099" opacity="0.9"/>
    <!-- Lightning sparks from crystal -->
    <path d="M12 76 L26 68 L30 80 L44 72" stroke="#ff4060" stroke-width="1.2" fill="none" opacity="0.9"/>
    <path d="M6 80 L-4 90 L-12 76 L-24 88" stroke="#ff4060" stroke-width="1" fill="none" opacity="0.8"/>
  </g>

  <!-- Right arm at side -->
  <path d="M164 180 L186 230 L192 280" stroke="url(#armorGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
  <circle cx="192" cy="282" r="5" fill="url(#redSkin)"/>

  <!-- Legs wide stance -->
  <path d="M106 340 Q96 365 88 378" stroke="#0a0203" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M150 340 Q160 365 168 378" stroke="#0a0203" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- Red sparks around -->
  <g fill="#ff0033" filter="url(#redGlow)">
    <circle cx="30" cy="150" r="1.5" opacity="0.9"/>
    <circle cx="40" cy="200" r="1" opacity="0.8"/>
    <circle cx="220" cy="170" r="1.5" opacity="0.9"/>
    <circle cx="230" cy="240" r="1" opacity="0.7"/>
    <circle cx="20" cy="260" r="1" opacity="0.6"/>
    <circle cx="240" cy="300" r="1.5" opacity="0.8"/>
  </g>

  <!-- Glitch characters -->
  <g fill="#ff0033" font-family="monospace" font-size="9" filter="url(#redGlow)">
    <text x="40" y="140" opacity="0.7">0x</text>
    <text x="210" y="200" opacity="0.6">FF</text>
    <text x="30" y="310" opacity="0.5">ERR</text>
    <text x="200" y="320" opacity="0.6">404</text>
  </g>

  <!-- Rim light (right side) -->
  <path d="M184 180 Q202 280 192 362" stroke="#ff0033" stroke-width="2" fill="none" opacity="0.8" filter="url(#redGlow)"/>
</svg>
